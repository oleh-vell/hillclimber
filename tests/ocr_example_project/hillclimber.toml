# hillclimber.toml — describes one experiment. This file lives at the artefact
# root: the scorer runs at each cycle's checkout root, so every path in here is
# relative to this directory.
path_to_artefact = "."
strategy = "chain"

# What the climb optimizes toward; the run stops early once `target` is reached.
[goal]
direction = "maximize"
target = 1.0

# Hard stop: how many improvement cycles to attempt.
[budget]
cycles = 5

# The fitness function: a command that prints an Eval as JSON on stdout
# (see eval.py). Its score is the number the climb pushes up.
[scorer]
kind = "command"
# `uv run` so eval.py executes in this project's environment (where mistralai is
# installed), not against whatever bare `python` happens to be on PATH.
cmd = "uv run python eval.py"

# Proposes the next hypothesis for improving the artefact.
[agents.orchestrator]
harness = "claude"
model = "claude-sonnet-4-6"

# Applies the proposed change to the artefact.
[agents.worker]
harness = "claude"
model = "claude-sonnet-4-6"
