path_to_artefact = "."
strategy = "chain"
# Ref the climb starts from (baseline scored at it, cycle 1 forks from it).
# Omit or leave empty to start from the artefact's current HEAD.
# start_branch = "main"

# Fitness function: run the eval, whose evaluate() returns a hillclimber.Eval.
[scorer]
kind = "command"
cmd = "python eval.py"

# Climb toward a perfect extraction score; stop early if we reach it.
[goal]
direction = "maximize"
target = 1.0

# Hard stop: number of cycles to attempt.
[budget]
cycles = 1

# Proposes the next hypothesis for improving the pipeline.
[hillclimber_agent]
harness = "api"
model = "claude-sonnet-4-6"

# Applies the proposed change to the artefact.
[worker_agent]
harness = "api"
model = "claude-sonnet-4-6"
# Reflects on the score delta and steers the next hypothesis.
[reflector_agent]
harness = "api"
model = "claude-sonnet-4-6"
