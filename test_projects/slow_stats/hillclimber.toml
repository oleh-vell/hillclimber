# A performance-climb test project: a correct-but-slow stats pipeline.
# Run it with a multi-cycle budget and watch the score rise as each cycle
# removes a bottleneck (trial-division primes, O(n^2) distinct, .count-per-value
# top-K) without changing any of the computed values.
path_to_artefact = "."
strategy = "chain"

# Maximize the score. The target is 1.0, which the speed term only approaches
# asymptotically — so the climb never early-stops and spends its whole budget.
[goal]
direction = "maximize"
target = 1.0

# Hard stop: enough cycles to knock out the three independent bottlenecks.
[budget]
cycles = 3

# Fitness function: run the eval, whose evaluate() returns a hillclimber.Eval.
# score = correctness * speed, so faster (still-correct) code scores higher.
[scorer]
kind = "command"
cmd = "python eval.py"

# Proposes the next hypothesis for speeding up the pipeline.
[agents.orchestrator]
harness = "claude"
model = "claude-sonnet-4-6"

# Applies the proposed change to the artefact.
[agents.worker]
harness = "claude"
model = "claude-sonnet-4-6"
